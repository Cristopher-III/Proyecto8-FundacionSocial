<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Niños · Proyecto 8</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
  <header class="admin-header">
    <a href="dashboard.html" class="nav-logo">
      <img src="../assets/images/logo.png" alt="P8" style="height:32px">
      <span class="logo-text">Gestión de Niños</span>
    </a>
    <div class="admin-user">
      <span id="adminName">Admin</span>
      <button class="btn btn-outline btn-logout" id="logoutBtn">Cerrar sesión</button>
    </div>
  </header>

  <div class="admin-container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px">
      <h1 style="font-size:1.3rem">Niños Beneficiarios</h1>
      <button class="btn btn-primary" id="addChildBtn">+ Registrar Niño</button>
    </div>

    <!-- Filters -->
    <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap">
      <input type="text" id="searchChild" placeholder="Buscar por nombre..." style="max-width:280px">
      <select id="filterProgram" style="max-width:200px">
        <option value="">Todos los programas</option>
        <option value="Apoyo Escolar">Apoyo Escolar</option>
        <option value="Acompañamiento">Acompañamiento</option>
        <option value="Nutrición">Nutrición</option>
        <option value="Talleres">Talleres</option>
        <option value="Fortalecimiento">Fortalecimiento</option>
        <option value="Recreación">Recreación</option>
      </select>
    </div>

    <!-- Table -->
    <div class="admin-card">
      <table class="data-table" id="childrenTable">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Edad</th>
            <th>Programa</th>
            <th>Tutor</th>
            <th>Teléfono</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="childrenTableBody">
          <tr><td colspan="6" class="text-muted" style="text-align:center;padding:32px">No hay niños registrados aún</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="childModal">
    <div class="modal">
      <h3 id="modalTitle">Registrar Niño</h3>
      <form id="childForm">
        <input type="hidden" id="childId">
        <div class="form-row">
          <div>
            <label>Nombre completo</label>
            <input type="text" id="childName" required>
          </div>
          <div>
            <label>Edad</label>
            <input type="number" id="childAge" min="0" max="18" required>
          </div>
        </div>
        <div class="form-row">
          <div>
            <label>Fecha de nacimiento</label>
            <input type="date" id="childDob">
          </div>
          <div>
            <label>Programa</label>
            <select id="childProgram" required>
              <option value="">Seleccionar...</option>
              <option value="Apoyo Escolar">Apoyo Escolar</option>
              <option value="Acompañamiento">Acompañamiento Psicosocial</option>
              <option value="Nutrición">Nutrición Infantil</option>
              <option value="Talleres">Talleres Artísticos</option>
              <option value="Fortalecimiento">Fortalecimiento Familiar</option>
              <option value="Recreación">Recreación y Deporte</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div>
            <label>Nombre del tutor</label>
            <input type="text" id="childTutor">
          </div>
          <div>
            <label>Teléfono del tutor</label>
            <input type="tel" id="childTutorPhone">
          </div>
        </div>
        <div class="form-row">
          <div>
            <label>Email del tutor</label>
            <input type="email" id="childTutorEmail">
          </div>
          <div>
            <label>Estado</label>
            <select id="childStatus">
              <option value="Activo">Activo</option>
              <option value="Inactivo">Inactivo</option>
              <option value="En espera">En espera</option>
            </select>
          </div>
        </div>
        <div>
          <label>Notas / observaciones</label>
          <textarea id="childNotes" rows="2"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" id="cancelChildBtn">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script>
    const session = JSON.parse(localStorage.getItem('p8-admin') || 'null');
    if (!session) window.location.href = 'index.html';
    document.getElementById('adminName').textContent = session.name || 'Admin';
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('p8-admin');
      window.location.href = 'index.html';
    });

    let children = JSON.parse(localStorage.getItem('p8-children') || '[]');
    let editingId = null;

    function saveData() {
      localStorage.setItem('p8-children', JSON.stringify(children));
    }

    function renderTable(filter = '', program = '') {
      const tbody = document.getElementById('childrenTableBody');
      const filtered = children.filter(c => {
        const matchName = c.name.toLowerCase().includes(filter.toLowerCase());
        const matchProgram = !program || c.program === program;
        return matchName && matchProgram;
      });

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-muted" style="text-align:center;padding:32px">No se encontraron resultados</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(c => `
        <tr>
          <td><strong>${c.name}</strong></td>
          <td>${c.age} años</td>
          <td>${c.program}</td>
          <td>${c.tutor || '—'}</td>
          <td>${c.tutorPhone || '—'}</td>
          <td>
            <div class="actions">
              <button class="btn btn-sm btn-outline" onclick="editChild('${c.id}')">Editar</button>
              <button class="btn btn-sm btn-danger" onclick="deleteChild('${c.id}')">Eliminar</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
    }

    // Open modal for new child
    document.getElementById('addChildBtn').addEventListener('click', () => {
      editingId = null;
      document.getElementById('modalTitle').textContent = 'Registrar Niño';
      document.getElementById('childForm').reset();
      document.getElementById('childId').value = '';
      document.getElementById('childModal').classList.add('active');
    });

    // Open modal for editing
    window.editChild = (id) => {
      const child = children.find(c => c.id === id);
      if (!child) return;
      editingId = id;
      document.getElementById('modalTitle').textContent = 'Editar Niño';
      document.getElementById('childId').value = id;
      document.getElementById('childName').value = child.name;
      document.getElementById('childAge').value = child.age;
      document.getElementById('childDob').value = child.dob || '';
      document.getElementById('childProgram').value = child.program;
      document.getElementById('childTutor').value = child.tutor || '';
      document.getElementById('childTutorPhone').value = child.tutorPhone || '';
      document.getElementById('childTutorEmail').value = child.tutorEmail || '';
      document.getElementById('childStatus').value = child.status || 'Activo';
      document.getElementById('childNotes').value = child.notes || '';
      document.getElementById('childModal').classList.add('active');
    };

    window.deleteChild = (id) => {
      if (!confirm('¿Estás seguro de eliminar este niño?')) return;
      children = children.filter(c => c.id !== id);
      saveData();
      renderTable(
        document.getElementById('searchChild').value,
        document.getElementById('filterProgram').value
      );
    };

    // Form submit
    document.getElementById('childForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const data = {
        name: document.getElementById('childName').value,
        age: parseInt(document.getElementById('childAge').value),
        dob: document.getElementById('childDob').value,
        program: document.getElementById('childProgram').value,
        tutor: document.getElementById('childTutor').value,
        tutorPhone: document.getElementById('childTutorPhone').value,
        tutorEmail: document.getElementById('childTutorEmail').value,
        status: document.getElementById('childStatus').value,
        notes: document.getElementById('childNotes').value
      };

      if (editingId) {
        const idx = children.findIndex(c => c.id === editingId);
        if (idx !== -1) {
          children[idx] = { ...children[idx], ...data };
        }
      } else {
        data.id = generateId();
        data.createdAt = new Date().toISOString();
        children.push(data);
      }

      saveData();
      renderTable(
        document.getElementById('searchChild').value,
        document.getElementById('filterProgram').value
      );
      document.getElementById('childModal').classList.remove('active');
    });

    // Close modal
    document.getElementById('cancelChildBtn').addEventListener('click', () => {
      document.getElementById('childModal').classList.remove('active');
    });

    document.getElementById('childModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('childModal')) {
        document.getElementById('childModal').classList.remove('active');
      }
    });

    // Search & filter
    document.getElementById('searchChild').addEventListener('input', (e) => {
      renderTable(e.target.value, document.getElementById('filterProgram').value);
    });

    document.getElementById('filterProgram').addEventListener('change', (e) => {
      renderTable(document.getElementById('searchChild').value, e.target.value);
    });

    // Initial render
    renderTable();
  </script>
</body>
</html>
