<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asistencia · Proyecto 8</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .attendance-child {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--color-card-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      transition: all var(--transition);
    }
    .attendance-child:hover {
      border-color: var(--color-primary);
    }
    .attendance-child .child-info strong {
      display: block;
      font-size: 0.95rem;
    }
    .attendance-child .child-info span {
      font-size: 0.82rem;
      color: var(--color-text-muted);
    }
    .attendance-child .child-actions {
      display: flex;
      gap: 8px;
    }
    .attendance-child.present {
      border-left: 4px solid var(--color-accent);
    }
    .attendance-child.absent {
      border-left: 4px solid #e74c3c;
    }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-present {
      background: rgba(39,174,96,0.15);
      color: var(--color-accent);
    }
    .badge-absent {
      background: rgba(231,76,60,0.15);
      color: #e74c3c;
    }
  </style>
</head>
<body class="admin-body">
  <header class="admin-header">
    <a href="dashboard.html" class="nav-logo">
      <img src="../assets/images/logo.png" alt="P8" style="height:32px">
      <span class="logo-text">Asistencia</span>
    </a>
    <div class="admin-user">
      <span id="adminName">Admin</span>
      <button class="btn btn-outline btn-logout" id="logoutBtn">Cerrar sesión</button>
    </div>
  </header>

  <div class="admin-container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px">
      <h1 style="font-size:1.3rem">Control de Asistencia</h1>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline" id="filterProgramBtn" style="font-size:0.85rem">Filtrar por programa</button>
        <button class="btn btn-primary" id="refreshAttendance">Actualizar</button>
      </div>
    </div>

    <div class="attendance-today">
      <span class="today-date" id="todayDate">—</span>
      <span id="attendanceSummary">0 presentes / 0 ausentes</span>
    </div>

    <div class="admin-card">
      <div id="attendanceList">
        <p class="text-muted">Cargando lista...</p>
      </div>
    </div>

    <!-- Program filter modal (simple inline) -->
    <select id="programFilterSelect" style="display:none;margin-bottom:16px;max-width:250px">
      <option value="">Todos los programas</option>
      <option value="Apoyo Escolar">Apoyo Escolar</option>
      <option value="Acompañamiento">Acompañamiento</option>
      <option value="Nutrición">Nutrición</option>
      <option value="Talleres">Talleres</option>
      <option value="Fortalecimiento">Fortalecimiento</option>
      <option value="Recreación">Recreación</option>
    </select>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script>
    const session = JSON.parse(localStorage.getItem('p8-admin') || 'null');
    if (!session) window.location.href = 'index.html';
    document.getElementById('adminName').textContent = session.name || 'Admin';
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('p8-admin');
      window.location.href = 'index.html';
    });

    const today = new Date().toLocaleDateString('es-ES', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
    document.getElementById('todayDate').textContent = today.charAt(0).toUpperCase() + today.slice(1);

    let children = JSON.parse(localStorage.getItem('p8-children') || '[]');
    let attendance = JSON.parse(localStorage.getItem('p8-attendance') || '[]');
    const todayKey = new Date().toISOString().split('T')[0];
    let currentFilter = '';

    function saveAttendance() {
      localStorage.setItem('p8-attendance', JSON.stringify(attendance));
    }

    function getTodayRecord(childId) {
      return attendance.find(a => a.childId === childId && a.date === todayKey);
    }

    function renderAttendance(filter = '') {
      const list = document.getElementById('attendanceList');
      const filtered = filter ? children.filter(c => c.program === filter) : children;

      if (filtered.length === 0) {
        list.innerHTML = '<p class="text-muted">No hay niños registrados en este programa.</p>';
        document.getElementById('attendanceSummary').textContent = '0 presentes / 0 ausentes';
        return;
      }

      let presentCount = 0;
      let absentCount = 0;

      list.innerHTML = filtered.map(c => {
        const record = getTodayRecord(c.id);
        const isPresent = record && record.checkIn && !record.checkOut;
        const isComplete = record && record.checkIn && record.checkOut;
        if (isPresent || isComplete) presentCount++;
        else if (record && record.status === 'absent') absentCount++;

        return `
          <div class="attendance-child ${isPresent || isComplete ? 'present' : ''}">
            <div class="child-info">
              <strong>${c.name}</strong>
              <span>${c.program} · ${c.age} años · Tutor: ${c.tutor || '—'}</span>
            </div>
            <div class="child-actions">
              ${!record || (!record.checkIn)
                ? `<button class="btn btn-sm btn-success" onclick="checkIn('${c.id}')">Entrada</button>
                   <button class="btn btn-sm btn-danger" onclick="markAbsent('${c.id}')">Ausente</button>`
                : !record.checkOut
                  ? `<span class="badge badge-present">Presente</span>
                     <button class="btn btn-sm btn-outline" onclick="checkOut('${c.id}')">Salida</button>`
                  : `<span class="badge ${record.status === 'absent' ? 'badge-absent' : 'badge-present'}">${record.status === 'absent' ? 'Ausente' : 'Completado'}</span>
                     <span class="text-muted" style="font-size:0.8rem">${record.checkIn} - ${record.checkOut}</span>`
              }
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('attendanceSummary').textContent =
        `${presentCount} presentes / ${absentCount} ausentes`;
    }

    window.checkIn = (childId) => {
      const now = new Date();
      const time = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
      attendance.push({
        id: generateId(),
        childId,
        date: todayKey,
        checkIn: time,
        checkOut: null,
        status: 'present'
      });
      saveAttendance();
      renderAttendance(currentFilter);
    };

    window.checkOut = (childId) => {
      const record = getTodayRecord(childId);
      if (!record) return;
      const now = new Date();
      record.checkOut = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
      saveAttendance();
      renderAttendance(currentFilter);
    };

    window.markAbsent = (childId) => {
      attendance.push({
        id: generateId(),
        childId,
        date: todayKey,
        checkIn: null,
        checkOut: null,
        status: 'absent'
      });
      saveAttendance();
      renderAttendance(currentFilter);
    };

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
    }

    document.getElementById('filterProgramBtn').addEventListener('click', () => {
      const select = document.getElementById('programFilterSelect');
      select.style.display = select.style.display === 'none' ? 'block' : 'none';
    });

    document.getElementById('programFilterSelect').addEventListener('change', (e) => {
      currentFilter = e.target.value;
      renderAttendance(currentFilter);
    });

    document.getElementById('refreshAttendance').addEventListener('click', () => {
      children = JSON.parse(localStorage.getItem('p8-children') || '[]');
      attendance = JSON.parse(localStorage.getItem('p8-attendance') || '[]');
      renderAttendance(currentFilter);
    });

    renderAttendance();
  </script>
</body>
</html>
